<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">

  <!-- Dark background -->
  <rect width="256" height="256" rx="52" fill="#0f1117"/>

  <!-- Left bracket [ -->
  <polyline
    points="74,44 44,44 44,212 74,212"
    fill="none"
    stroke="#f1f5f9"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Right bracket ] -->
  <polyline
    points="182,44 212,44 212,212 182,212"
    fill="none"
    stroke="#f1f5f9"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Middle divider | — taller, centered -->
  <line
    x1="128" y1="56"
    x2="128" y2="200"
    stroke="#f1f5f9"
    stroke-width="13"
    stroke-linecap="round"/>

  <!-- ═══ LEFT PANEL — 4 rows (zarovnané hore) ═══ -->

  <!-- Row 1: yellow folder -->
  <rect x="60" y="60" width="13" height="13" rx="2.5" fill="#fbbf24"/>
  <line x1="80" y1="66.5" x2="116" y2="66.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

  <!-- Row 2: blue file -->
  <rect x="60" y="81" width="13" height="13" rx="2.5" fill="#60a5fa"/>
  <line x1="80" y1="87.5" x2="108" y2="87.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

  <!-- Row 3: green file -->
  <rect x="60" y="102" width="13" height="13" rx="2.5" fill="#34d399"/>
  <line x1="80" y1="108.5" x2="114" y2="108.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

  <!-- Row 4: purple file -->
  <rect x="60" y="123" width="13" height="13" rx="2.5" fill="#a78bfa"/>
  <line x1="80" y1="129.5" x2="102" y2="129.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

  <!-- ═══ RIGHT PANEL — 3 rows (zarovnané hore) ═══ -->

  <!-- Row 1: orange folder -->
  <rect x="143" y="60" width="13" height="13" rx="2.5" fill="#fb923c"/>
  <line x1="163" y1="66.5" x2="197" y2="66.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

  <!-- Row 2: cyan file -->
  <rect x="143" y="81" width="13" height="13" rx="2.5" fill="#22d3ee"/>
  <line x1="163" y1="87.5" x2="190" y2="87.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

  <!-- Row 3: pink/red file -->
  <rect x="143" y="102" width="13" height="13" rx="2.5" fill="#f87171"/>
  <line x1="163" y1="108.5" x2="194" y2="108.5" stroke="#3f4f66" stroke-width="5" stroke-linecap="round"/>

</svg>
